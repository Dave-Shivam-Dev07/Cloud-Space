<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👤 CloudSpace+ | Platinum Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --platinum-primary: #c0c5ce;
            --platinum-accent: #00d4ff;
            --platinum-glow: #4facfe;
            --platinum-dark: #0a0e27;
            --neon-cyan: #00d4ff;
            --neon-magenta: #ff00ff;
            --neon-blue: #0099ff;
            --glass: rgba(192, 197, 206, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #0a0e27;
            background-image: 
                radial-gradient(ellipse at 10% 20%, rgba(0, 212, 255, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 90% 80%, rgba(192, 197, 206, 0.15) 0%, transparent 50%),
                linear-gradient(180deg, #0a0e27 0%, #050810 100%);
            color: var(--platinum-primary);
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        /* Animated gradient overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: linear-gradient(125deg, 
                transparent 0%,
                rgba(0, 212, 255, 0.08) 25%,
                rgba(192, 197, 206, 0.12) 50%,
                rgba(0, 212, 255, 0.08) 75%,
                transparent 100%);
            background-size: 400% 400%;
            animation: gradientShift 20s ease infinite;
            opacity: 0.6;
            z-index: -1;
            pointer-events: none;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* Floating Orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.35;
            animation: floatOrb 25s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        .orb:nth-child(1) {
            width: 380px;
            height: 380px;
            background: radial-gradient(circle, var(--platinum-accent), transparent);
            top: 8%;
            left: 8%;
            animation-delay: 0s;
        }

        .orb:nth-child(2) {
            width: 480px;
            height: 480px;
            background: radial-gradient(circle, var(--platinum-glow), transparent);
            top: 55%;
            right: 8%;
            animation-delay: 8s;
        }

        @keyframes floatOrb {
            0%, 100% { transform: translate(0, 0) scale(1) rotate(0deg); }
            33% { transform: translate(45px, -50px) scale(1.15) rotate(120deg); }
            66% { transform: translate(-45px, 50px) scale(0.85) rotate(240deg); }
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, rgba(192, 197, 206, 0.12), rgba(0, 212, 255, 0.08));
            backdrop-filter: blur(30px) saturate(180%);
            border-bottom: 1px solid rgba(192, 197, 206, 0.25);
            z-index: 100;
            padding: 18px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 32px rgba(0, 212, 255, 0.15);
        }

        .header-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.6em;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff, #00d4ff, #c0c5ce, #4facfe);
            background-size: 300% 300%;
            animation: textGlow 5s ease infinite;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 8px rgba(0, 212, 255, 0.3));
        }
        @keyframes textGlow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .back-btn {
            padding: 11px 22px;
            background: linear-gradient(135deg, rgba(192, 197, 206, 0.12), rgba(0, 212, 255, 0.08));
            border: 1px solid rgba(192, 197, 206, 0.3);
            color: var(--platinum-accent);
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.35s ease;
            backdrop-filter: blur(10px);
        }

        .back-btn:hover {
            background: linear-gradient(135deg, rgba(192, 197, 206, 0.2), rgba(0, 212, 255, 0.15));
            transform: translateX(-6px) scale(1.05);
            box-shadow: 0 8px 24px rgba(0, 212, 255, 0.25);
            border-color: var(--platinum-accent);
        }

        /* Container */
        .container {
            position: relative;
            z-index: 10;
            max-width: 1000px;
            margin: 100px auto 40px;
            padding: 0 20px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
            border-bottom: 2px solid rgba(192, 197, 206, 0.15);
            padding-bottom: 18px;
        }

        .tab-btn {
            padding: 13px 28px;
            background: transparent;
            border: none;
            color: rgba(192, 197, 206, 0.6);
            cursor: pointer;
            font-weight: 600;
            position: relative;
            transition: all 0.35s ease;
            font-family: 'Poppins', sans-serif;
            font-size: 1.05rem;
            border-radius: 10px;
        }

        .tab-btn.active {
            color: var(--platinum-accent);
            background: rgba(0, 212, 255, 0.08);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -19px;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--platinum-accent), var(--platinum-glow));
            box-shadow: 0 0 24px var(--platinum-accent);
        }

        .tab-btn:hover {
            color: var(--platinum-accent);
            transform: translateY(-3px);
            background: rgba(0, 212, 255, 0.05);
        }

        /* Tab Content */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Profile Card */
        .profile-card {
            background: linear-gradient(135deg, rgba(192, 197, 206, 0.12), rgba(0, 212, 255, 0.08));
            backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid rgba(192, 197, 206, 0.25);
            border-radius: 24px;
            padding: 44px;
            margin-bottom: 32px;
            box-shadow: 0 20px 60px rgba(0, 212, 255, 0.15), inset 0 1px 2px rgba(255,255,255,0.1);
            transition: all 0.35s ease;
        }
        
        .profile-card:hover {
            border-color: rgba(0, 212, 255, 0.4);
            box-shadow: 0 25px 70px rgba(0, 212, 255, 0.25), inset 0 1px 2px rgba(255,255,255,0.15);
            transform: translateY(-4px);
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 40px;
        }

        .profile-avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--platinum-accent), var(--platinum-glow));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.2em;
            box-shadow: 0 0 50px rgba(0, 212, 255, 0.5), inset 0 2px 4px rgba(255,255,255,0.2);
            flex-shrink: 0;
            animation: glow 3s ease-in-out infinite;
        }
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 50px rgba(0, 212, 255, 0.5), inset 0 2px 4px rgba(255,255,255,0.2); }
            50% { box-shadow: 0 0 70px rgba(0, 212, 255, 0.7), inset 0 2px 4px rgba(255,255,255,0.3); }
        }

        .profile-info h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2em;
            margin-bottom: 12px;
            color: var(--platinum-accent);
            text-shadow: 0 2px 16px rgba(0, 212, 255, 0.4);
        }

        .profile-info p {
            color: rgba(192, 197, 206, 0.8);
            margin-bottom: 6px;
            font-size: 1rem;
        }

        /* Info Grid */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .info-item {
            background: rgba(0, 212, 255, 0.06);
            border: 1px solid rgba(192, 197, 206, 0.25);
            border-radius: 14px;
            padding: 22px;
            transition: all 0.35s ease;
            backdrop-filter: blur(10px);
        }

        .info-item:hover {
            background: rgba(0, 212, 255, 0.12);
            border-color: var(--platinum-accent);
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 32px rgba(0, 212, 255, 0.2);
        }

        .info-label {
            font-size: 0.95em;
            color: rgba(192, 197, 206, 0.7);
            margin-bottom: 10px;
            font-weight: 600;
        }

        .info-value {
            font-size: 1.3em;
            color: var(--platinum-accent);
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            word-break: break-all;
            text-shadow: 0 2px 12px rgba(0, 212, 255, 0.3);
        }

        /* Plan Cards */
        .plan-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .plan-card {
            background: linear-gradient(135deg, rgba(192, 197, 206, 0.1), rgba(0, 212, 255, 0.06));
            backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(192, 197, 206, 0.25);
            border-radius: 20px;
            padding: 32px;
            position: relative;
            overflow: hidden;
            transition: all 0.45s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .plan-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(192, 197, 206, 0.08));
            opacity: 0;
            transition: opacity 0.4s;
        }

        .plan-card:hover {
            border-color: var(--platinum-accent);
            transform: translateY(-12px) scale(1.02);
            box-shadow: 0 25px 70px rgba(0, 212, 255, 0.35);
        }
        
        .plan-card:hover::before {
            opacity: 1;
        }

        .plan-card.active {
            border-color: var(--platinum-glow);
            background: rgba(0, 212, 255, 0.12);
            box-shadow: 0 20px 60px rgba(0, 212, 255, 0.4);
        }

        .plan-content {
            position: relative;
            z-index: 2;
        }

        .plan-badge {
            display: inline-block;
            background: linear-gradient(135deg, var(--platinum-accent), var(--platinum-glow));
            color: #0a0e27;
            padding: 7px 14px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 700;
            margin-bottom: 16px;
            box-shadow: 0 4px 16px rgba(0, 212, 255, 0.3);
        }

        .plan-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.6em;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--platinum-accent);
            text-shadow: 0 2px 12px rgba(0, 212, 255, 0.3);
        }

        .plan-price {
            font-size: 2.8em;
            font-weight: 700;
            color: var(--platinum-glow);
            margin-bottom: 6px;
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 3px 16px rgba(79, 172, 254, 0.4);
        }

        .plan-price span {
            font-size: 0.4em;
            color: rgba(192, 197, 206, 0.7);
        }

        .plan-features {
            margin: 22px 0;
            padding: 22px 0;
            border-top: 1px solid rgba(192, 197, 206, 0.15);
            border-bottom: 1px solid rgba(192, 197, 206, 0.15);
        }

        .plan-feature {
            padding: 9px 0;
            color: rgba(192, 197, 206, 0.85);
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.95rem;
        }

        .plan-feature::before {
            content: '✓';
            color: var(--platinum-accent);
            font-weight: 700;
            font-size: 1.3em;
            text-shadow: 0 0 12px var(--platinum-accent);
        }

        .plan-btn {
            width: 100%;
            padding: 14px;
            margin-top: 18px;
            background: linear-gradient(135deg, var(--platinum-accent), var(--platinum-glow));
            background-size: 200% 200%;
            animation: gradientShift 4s ease infinite;
            color: #0a0e27;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: 'Poppins', sans-serif;
            font-size: 1.05rem;
            box-shadow: 0 8px 24px rgba(0, 212, 255, 0.3), inset 0 1px 1px rgba(255,255,255,0.2);
        }

        .plan-btn:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 12px 36px rgba(0, 212, 255, 0.5);
        }

        .plan-card.active .plan-btn {
            background: linear-gradient(135deg, rgba(192, 197, 206, 0.2), rgba(0, 212, 255, 0.15));
            color: var(--platinum-accent);
            border: 1px solid rgba(192, 197, 206, 0.3);
            cursor: default;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 32px;
            right: 32px;
            background: linear-gradient(135deg, rgba(192, 197, 206, 0.15), rgba(0, 212, 255, 0.12));
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--platinum-accent);
            border-radius: 16px;
            padding: 16px 28px;
            color: var(--platinum-accent);
            font-weight: 600;
            box-shadow: 0 12px 40px rgba(0, 212, 255, 0.35), inset 0 1px 1px rgba(255,255,255,0.1);
            animation: toastSlide 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10000;
            display: none;
        }

        @keyframes toastSlide {
            from { opacity: 0; transform: translateX(120%); }
            to { opacity: 1; transform: translateX(0); }
        }

        .toast.show {
            display: block;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                margin-top: 80px;
            }

            .profile-header {
                flex-direction: column;
                text-align: center;
            }

            .plan-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="orb"></div>
    <div class="orb"></div>

    <!-- Header -->
    <div class="header">
        <div class="header-title">👤 YOUR PROFILE</div>
        <button class="back-btn" onclick="goBack()">🔙 Back</button>
    </div>

    <div class="container">
        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('profile')">👤 Profile</button>
            <button class="tab-btn" onclick="switchTab('plans')">📊 Plans & Pricing</button>
            <button class="tab-btn" onclick="switchTab('settings')">⚙️ Settings</button>
        </div>

        <!-- Profile Tab -->
        <div id="profile" class="tab-content active">
            <div class="profile-card">
                <div class="profile-header">
                    <div class="profile-avatar">👤</div>
                    <div class="profile-info">
                        <h2 id="userNameDisplay">Loading...</h2>
                        <p>👑 Platinum Member</p>
                        <p id="userPlanDisplay">Plan: Platinum</p>
                        <p style="margin-top: 10px; font-size: 0.85em; color: rgba(255, 255, 255, 0.5);">Member since Dec 2024</p>
                    </div>
                </div>

                <h3 style="font-family: 'Orbitron', sans-serif; margin-bottom: 24px; color: var(--platinum-accent); text-shadow: 0 2px 12px rgba(0, 212, 255, 0.3); font-size: 1.5rem;">Account Information</h3>

                <div class="info-grid">
                    <div class="info-item">
                        <div class="info-label">📧 Email</div>
                        <div class="info-value" id="userEmailDisplay">Loading...</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">🆔 User ID</div>
                        <div class="info-value" id="userIdDisplay">Loading...</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">💾 Storage Used</div>
                        <div class="info-value" id="storageUsedDisplay">Loading...</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">📁 Files Uploaded</div>
                        <div class="info-value" id="filesCountDisplay">0</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Plans Tab -->
        <div id="plans" class="tab-content">
            <div class="plan-grid" id="plansGrid">
                <!-- Plans will be dynamically loaded here -->
                <div style="grid-column: 1/-1; text-align: center; padding: 40px;">
                    <div style="font-size: 2em; margin-bottom: 15px;">⏳</div>
                    <div>Loading plans and pricing...</div>
                </div>
            </div>
        </div>

        <!-- Settings Tab -->
        <div id="settings" class="tab-content">
            <div class="profile-card">
                <h3 style="font-family: 'Orbitron', sans-serif; margin-bottom: 24px; color: var(--platinum-accent); text-shadow: 0 2px 12px rgba(0, 212, 255, 0.3); font-size: 1.5rem;">Account Settings</h3>

                <div class="info-grid">
                    <button class="plan-btn" style="background: linear-gradient(135deg, rgba(192, 197, 206, 0.15), rgba(0, 212, 255, 0.12)); color: var(--platinum-accent); border: 1px solid rgba(192, 197, 206, 0.3); box-shadow: 0 8px 24px rgba(0, 212, 255, 0.15);" onclick="editProfile()">
                        ✏️ Edit Profile
                    </button>
                    <button class="plan-btn" style="background: linear-gradient(135deg, rgba(192, 197, 206, 0.15), rgba(0, 212, 255, 0.12)); color: var(--platinum-accent); border: 1px solid rgba(192, 197, 206, 0.3); box-shadow: 0 8px 24px rgba(0, 212, 255, 0.15);" onclick="changePassword()">
                        🔐 Change Password
                    </button>
                    <button class="plan-btn" style="background: linear-gradient(135deg, rgba(255, 80, 80, 0.15), rgba(255, 107, 107, 0.12)); color: #ff6b6b; border: 1px solid rgba(255, 107, 107, 0.4); box-shadow: 0 8px 24px rgba(255, 107, 107, 0.2);" onclick="logoutUser()">
                        🚪 Logout
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        const isJwtToken = (value) => typeof value === 'string' && value.split('.').length === 3;

        // Get user data from URL
        function getUserData() {
            const params = new URLSearchParams(window.location.search);
            const queryToken = params.get('token');
            const storedJwt = localStorage.getItem('token');
            const storedPlanToken = sessionStorage.getItem('premiumToken') || localStorage.getItem('premiumToken') || sessionStorage.getItem('platinumToken');
            const jwtFromQuery = isJwtToken(queryToken) ? parseJwt(queryToken) : null;
            const jwtFromStorage = isJwtToken(storedJwt) ? parseJwt(storedJwt) : null;
            const uidFromJwt = jwtFromQuery?.uid || jwtFromStorage?.uid || '';
            const uid = params.get('uid') || sessionStorage.getItem('uid') || uidFromJwt || localStorage.getItem('uid');

            const jwtToken = isJwtToken(queryToken) ? queryToken : (isJwtToken(storedJwt) ? storedJwt : null);
            const planToken = !isJwtToken(queryToken) && queryToken ? queryToken : (storedPlanToken || null);

            if (uid) {
                localStorage.setItem('uid', uid);
                sessionStorage.setItem('uid', uid);
            }
            if (planToken) {
                sessionStorage.setItem('premiumToken', planToken);
                sessionStorage.setItem('platinumToken', planToken);
                localStorage.setItem('premiumToken', planToken);
            }

            return {
                jwtToken,
                planToken,
                uid
            };
        }

        function getAuthHeaders() {
            const headers = {};
            if (userData.jwtToken) headers['Authorization'] = `Bearer ${userData.jwtToken}`;
            if (userData.planToken) headers['x-plan-token'] = userData.planToken;
            return headers;
        }

        const userData = getUserData();
        let resolvedUserUid = userData.uid || '';
        let userPlanData = null;
        let allPlans = [];

        function inferPlanFromToken(planToken) {
            const tokenUpper = String(planToken || '').toUpperCase();
            if (tokenUpper.includes('ULTRPLAN') || tokenUpper.includes('TOK-UCS') || tokenUpper.includes('UTK-USR')) return 'ultra';
            if (tokenUpper.includes('PLATPLAN') || tokenUpper.includes('TOK-PCS') || tokenUpper.includes('TOK-PLATINUM')) return 'platinum';
            return 'free';
        }

        function prettifyPlanName(plan) {
            const safePlan = String(plan || 'free').toLowerCase();
            return safePlan.charAt(0).toUpperCase() + safePlan.slice(1);
        }

        // Parse JWT
        function parseJwt(token) {
            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(atob(base64).split('').map(c => {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                return JSON.parse(jsonPayload);
            } catch (e) {
                return null;
            }
        }

        // Initialize profile - fetch all data
        async function initProfile() {
            // First verify user is logged in and get user data
            try {
                if (!userData.uid && !userData.jwtToken) {
                    document.getElementById('userNameDisplay').textContent = 'Not Logged In';
                    document.getElementById('userEmailDisplay').textContent = 'Please login first';
                    return;
                }

                let user = null;
                let userEmail = userData.uid || 'User';

                if (userData.jwtToken) {
                    const meResponse = await fetch('/me', { headers: getAuthHeaders() });
                    if (meResponse.ok) {
                        user = await meResponse.json();
                        userEmail = user.email || userData.uid || 'User';
                    }
                }

                if ((!user || !userEmail || userEmail === 'User') && userData.uid) {
                    const snapshotRes = await fetch(`/user-plan/${encodeURIComponent(userData.uid)}`, { headers: getAuthHeaders() });
                    if (snapshotRes.ok) {
                        const snapshot = await snapshotRes.json();
                        const snapshotUser = snapshot.self || {};
                        user = user || snapshotUser;
                        userEmail = snapshotUser.email || snapshot.email || userData.uid;
                    }
                }

                if (userData.uid) {
                    const profileRes = await fetch(`/api/plan-active/${encodeURIComponent(userData.uid)}`, { headers: getAuthHeaders() });
                    if (profileRes.ok) {
                        const profileData = await profileRes.json();
                        const selfData = profileData?.data?.self || {};
                        user = user || selfData;
                        if (selfData.email) userEmail = selfData.email;
                    }
                }

                // Update display with actual user data
                document.getElementById('userEmailDisplay').textContent = userEmail;
                resolvedUserUid = user?.uid || userData.uid || resolvedUserUid || '';
                if (resolvedUserUid) {
                    localStorage.setItem('uid', resolvedUserUid);
                    sessionStorage.setItem('uid', resolvedUserUid);
                }
                document.getElementById('userIdDisplay').textContent = resolvedUserUid || 'N/A';

                // Load plan first to get userName, then load other data
                const planData = await loadUserPlan(userData.uid, userEmail);
                
                // Use userName from plan API if available
                const userName = planData.userName
                    || planData.name
                    || user?.name
                    || user?.username
                    || (userEmail && String(userEmail).includes('@') ? String(userEmail).split('@')[0] : '')
                    || userData.uid
                    || 'User';
                document.getElementById('userNameDisplay').textContent = userName;

                // Load remaining data in parallel
                await Promise.all([
                    loadStorageInfo(userEmail),
                    loadPlansAndPricing()
                ]);
            } catch (error) {
                console.error('Error initializing profile:', error);
                document.getElementById('userNameDisplay').textContent = 'Error';
                document.getElementById('userEmailDisplay').textContent = 'Failed to load profile';
            }
        }

        // Load user's current plan from new non-admin endpoint
        async function loadUserPlan(uid, userEmail) {
            try {
                console.log('=== Loading User Plan ===');
                console.log('Email:', userEmail);
                const tokenPlan = inferPlanFromToken(userData.planToken);
                let resolvedPlan = 'free';
                let resolvedName = '';
                let resolvedCurrentPlan = null;

                if (uid) {
                    const snapshotRes = await fetch(`/user-plan/${encodeURIComponent(uid)}`, { headers: getAuthHeaders() });
                    if (snapshotRes.ok) {
                        const snapshotData = await snapshotRes.json();
                        const apiPlan = String(snapshotData.plan || 'free').toLowerCase();
                        resolvedPlan = apiPlan;
                    }

                    const activeRes = await fetch(`/api/plan-active/${encodeURIComponent(uid)}`, { headers: getAuthHeaders() });
                    if (activeRes.ok) {
                        const activeData = await activeRes.json();
                        const selfData = activeData?.data?.self || {};
                        const plans = Array.isArray(activeData?.data?.plans) ? activeData.data.plans : [];
                        const latestPlan = plans.slice().sort((a, b) => {
                            const aTs = new Date(a?.transaction?.activatedAt || a?.transaction?.purchasedAt || 0).getTime();
                            const bTs = new Date(b?.transaction?.activatedAt || b?.transaction?.purchasedAt || 0).getTime();
                            return bTs - aTs;
                        })[0];

                        if (latestPlan?.plan) {
                            resolvedPlan = String(latestPlan.plan).toLowerCase();
                            resolvedCurrentPlan = { plan: resolvedPlan };
                        }

                        resolvedName = selfData.name || selfData.username || '';
                    }
                }

                if ((resolvedPlan === 'free' || !resolvedPlan) && tokenPlan !== 'free') {
                    resolvedPlan = tokenPlan;
                    resolvedCurrentPlan = { plan: resolvedPlan };
                }

                const displayName = prettifyPlanName(resolvedPlan);
                document.getElementById('userPlanDisplay').textContent = `📊 Plan: ${displayName}`;

                userPlanData = resolvedCurrentPlan || { plan: resolvedPlan };
                return {
                    plan: resolvedPlan,
                    userName: resolvedName,
                    currentPlan: userPlanData
                };
            } catch (error) {
                console.error('❌ Exception loading plan:', error);
                const tokenPlan = inferPlanFromToken(userData.planToken);
                const fallbackPlan = tokenPlan !== 'free' ? tokenPlan : 'free';
                document.getElementById('userPlanDisplay').textContent = `📊 Plan: ${prettifyPlanName(fallbackPlan)}`;
                userPlanData = { plan: fallbackPlan };
                return { plan: fallbackPlan, currentPlan: userPlanData };
            }
        }

        // Load storage info from files endpoint (non-admin, uses email parameter)
        async function loadStorageInfo(userEmail) {
            try {
                console.log('=== Starting loadStorageInfo ===');
                console.log('User Email:', userEmail);
                
                // Use /files/:email endpoint which works for all users (doesn't require admin)
                const response = await fetch(`/files/${encodeURIComponent(userEmail)}`, {
                    headers: getAuthHeaders()
                });

                console.log('Response Status:', response.status);

                if (response.ok) {
                    const files = await response.json();
                    console.log('Files array from /files/:email endpoint:', files);
                    console.log('Files array length:', files.length);
                    console.log('Files array type:', Array.isArray(files));
                    
                    if (!files || !Array.isArray(files)) {
                        console.error('Files is not an array!');
                        document.getElementById('storageUsedDisplay').textContent = '0 Bytes';
                        document.getElementById('filesCountDisplay').textContent = '0';
                        return;
                    }
                    
                    // Debug: Log first file
                    if (files.length > 0) {
                        console.log('First file sample:', files[0]);
                    }
                    
                    if (files && files.length > 0) {
                        // Sum up all file sizes (bytes) - just like the upload page does
                        const totalBytes = files.reduce((sum, f) => sum + (f.bytes || f.size || 0), 0);
                        const filesCount = files.length;
                        
                        console.log('Total bytes calculated:', totalBytes);
                        console.log('Files count:', filesCount);
                        
                        document.getElementById('storageUsedDisplay').textContent = formatFileSize(totalBytes);
                        document.getElementById('filesCountDisplay').textContent = filesCount;
                    } else {
                        console.log('No files found for user:', userEmail);
                        document.getElementById('storageUsedDisplay').textContent = '0 Bytes';
                        document.getElementById('filesCountDisplay').textContent = '0';
                    }
                } else {
                    console.error('Failed to fetch files. Status:', response.status);
                    const errorText = await response.text();
                    console.error('Error response:', errorText);
                    document.getElementById('storageUsedDisplay').textContent = '0 Bytes';
                    document.getElementById('filesCountDisplay').textContent = '0';
                }
            } catch (error) {
                console.error('Exception in loadStorageInfo:', error);
                document.getElementById('storageUsedDisplay').textContent = '0 Bytes';
                document.getElementById('filesCountDisplay').textContent = '0';
            }
        }

        // Load all plans and pricing from JSON data
        async function loadPlansAndPricing() {
            try {
                const response = await fetch('/api/plans', { cache: 'no-store' });

                if (response.ok) {
                    const data = await response.json();
                    const plansData = data?.success && data?.plans ? Object.values(data.plans) : [];
                    
                    if (plansData && Object.keys(plansData).length > 0) {
                        allPlans = plansData.map((plan) => ({
                            key: plan.key || (plan.name || 'plan').toLowerCase(),
                            name: plan.name || 'Plan',
                            price: Number(plan.amount || plan.price || 0),
                            storage: plan.storageTB ? `${plan.storageTB} TB` : (plan.storage || '0 GB'),
                            features: plan.features || [
                                `${plan.storageTB || 0} TB Storage`,
                                `${plan.durationDays || 30} Days Access`,
                                plan.note || 'Premium Support'
                            ],
                            badge: plan.badge || (plan.key || 'PLAN').toUpperCase()
                        }));
                        console.log('Loaded Plans:', allPlans);
                        renderPlanCards();
                    } else {
                        allPlans = getDefaultPlans();
                        renderPlanCards();
                    }
                } else {
                    // Use default plans silently for non-admin users
                    allPlans = getDefaultPlans();
                    renderPlanCards();
                }
            } catch (error) {
                console.error('Error loading plans:', error);
                allPlans = getDefaultPlans();
                renderPlanCards();
            }
        }

        // Get default plans if API call fails
        function getDefaultPlans() {
            return [
                {
                    name: 'Silver',
                    key: 'silver',
                    price: 1250,
                    storage: '5 TB',
                    features: ['5 TB Storage', '30 Days Access', 'Monthly (30 days)'],
                    badge: 'STARTER'
                },
                {
                    name: 'Gold',
                    key: 'gold',
                    price: 5000,
                    storage: '20 TB',
                    features: ['20 TB Storage', '90 Days Access', 'Quarterly (90 days)'],
                    badge: 'POPULAR'
                },
                {
                    name: 'Platinum',
                    key: 'platinum',
                    price: 25000,
                    storage: '100 TB',
                    features: ['100 TB Storage', '180 Days Access', 'Half-yearly (180 days)'],
                    badge: 'PREMIUM'
                },
                {
                    name: 'Ultra',
                    key: 'ultra',
                    price: 50000,
                    storage: '200 TB',
                    features: ['200 TB Storage', '1 Year Access', 'Yearly (1 year)'],
                    badge: 'ULTIMATE'
                }
            ];
        }

        // Render plan cards dynamically
        function renderPlanCards() {
            const plansGrid = document.getElementById('plansGrid');
            plansGrid.innerHTML = '';

            if (!allPlans || allPlans.length === 0) {
                plansGrid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px;"><div style="font-size: 2em; margin-bottom: 15px;">❌</div><div>No plans available</div></div>';
                return;
            }

            allPlans.forEach(plan => {
                const planId = plan.key || plan.name.toLowerCase();
                const isCurrentPlan = userPlanData && userPlanData.plan === planId;
                
                const card = document.createElement('div');
                card.className = `plan-card ${isCurrentPlan ? 'active' : ''}`;
                
                // Format price as INR currency
                // Prices in plan-price.json are already in rupees, no conversion needed
                let priceDisplay = '₹0';
                if (typeof plan.price === 'number' && plan.price > 0) {
                    priceDisplay = `₹${Math.round(plan.price).toLocaleString('en-IN')}`;
                } else if (plan.price && !isNaN(plan.price)) {
                    const numPrice = Number(plan.price);
                    priceDisplay = `₹${Math.round(numPrice).toLocaleString('en-IN')}`;
                }
                
                card.innerHTML = `
                    <div class="plan-content">
                        <span class="plan-badge">${plan.badge || 'PLAN'}</span>
                        <div class="plan-name">${plan.name}</div>
                        <div class="plan-price">${priceDisplay}<span>/month</span></div>
                        <div class="plan-features">
                            ${(plan.features || []).map(feature => `<div class="plan-feature">${feature}</div>`).join('')}
                        </div>
                        <button class="plan-btn" ${isCurrentPlan ? 'disabled style="opacity: 0.7; cursor: not-allowed;"' : ''} onclick="${isCurrentPlan ? '' : `selectPlan('${planId}')`}">
                            ${isCurrentPlan ? '✓ Current Plan' : 'Get This Plan'}
                        </button>
                    </div>
                `;
                plansGrid.appendChild(card);
            });
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }

        // Tab switching
        function switchTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });

            // Remove active class from all buttons
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // Show selected tab
            document.getElementById(tabName).classList.add('active');

            // Add active class to selected tab button
            const targetBtn = document.querySelector(`.tab-btn[onclick="switchTab('${tabName}')"]`);
            if (targetBtn) targetBtn.classList.add('active');
        }

        // Functions
        function goBack() {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token') || userData.planToken;
            const uid = resolvedUserUid || params.get('uid') || userData.uid;
            const query = [];
            if (token) query.push(`token=${encodeURIComponent(token)}`);
            if (uid) query.push(`uid=${encodeURIComponent(uid)}`);
            const qs = query.length ? `?${query.join('&')}` : '';
            window.location.href = `/platinum-ui-upload.html${qs}`;
        }

        function editProfile() {
            showToast('✏️ Profile editor coming soon');
        }

        function changePassword() {
            showToast('🔐 Change password feature coming soon');
        }

        function selectPlan(plan) {
            showToast(`📊 Redirecting to ${plan} plan payment...`);
            setTimeout(() => {
                const params = new URLSearchParams(window.location.search);
                const uid = resolvedUserUid || params.get('uid') || userData.uid || '';
                
                // Find plan details
                const selectedPlan = allPlans.find(p => p.name.toLowerCase() === plan.toLowerCase());
                
                // Build payment URL with plan details
                const paymentParams = new URLSearchParams();
                if (uid) paymentParams.set('uid', uid);
                paymentParams.set('plan', plan);
                paymentParams.set('source', 'platinum-ui-profile');
                if (selectedPlan) {
                    paymentParams.set('price', selectedPlan.price);
                    paymentParams.set('name', selectedPlan.name);
                    paymentParams.set('storage', selectedPlan.storage);
                }
                
                window.location.href = `/upgrade-form.html?${paymentParams.toString()}`;
            }, 1500);
        }

        function logoutUser() {
            showToast('🚪 Logging out...');
            setTimeout(() => {
                localStorage.removeItem('token');
                localStorage.removeItem('uid');
                sessionStorage.removeItem('platinumToken');
                window.location.href = '/login.html';
            }, 1000);
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Initialize on load
        window.addEventListener('load', initProfile);

        // Handle hash navigation
        window.addEventListener('hashchange', () => {
            const hash = window.location.hash.slice(1);
            if (hash === 'edit' || hash === 'plans' || hash === 'settings') {
                switchTab(hash);
            }
        });
    </script>
