<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test Premium UI</title>
  <link rel="stylesheet" href="/index.css" />
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:radial-gradient(circle at 20% 20%, #13294b, #0b162a); color:#e8f0ff; font-family:Inter, Helvetica, Arial, sans-serif; }
    .card { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); border-radius:18px; padding:28px; width: min(480px, 92vw); box-shadow:0 12px 40px rgba(0,0,0,0.35); backdrop-filter: blur(10px); }
    .btn { display:inline-block; padding:12px 16px; border-radius:10px; border:none; background:linear-gradient(135deg,#38ef7d,#11998e); color:#0b162a; font-weight:700; text-decoration:none; transition:transform 0.15s ease, box-shadow 0.15s ease; }
    .btn:hover { transform:translateY(-1px); box-shadow:0 10px 24px rgba(17,153,142,0.35); }
    .meta { color:#8ca3c1; font-size:13px; }
    code { background:rgba(255,255,255,0.06); padding:4px 6px; border-radius:6px; color:#d4f4ff; }
  </style>
</head>
<body>
  <div class="card">
    <h2 style="margin:0 0 10px;">🚀 Test Premium UI</h2>
    <p style="margin:0 0 14px;">You’re accessing the test interface for short-lived plans (Flash 40TB, 6 minutes).</p>
    <p class="meta" id="info"></p>
    <a class="btn" id="cta" href="#">Refresh Access</a>
    <p class="meta" id="blocked" style="display:none;color:#f99;">Access token required. Redirecting to upgrade...</p>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const uid = params.get('uid') || 'unknown';
    const token = params.get('token') || 'missing';
    const plan = params.get('plan') || 'flash40';
    const infoEl = document.getElementById('info');
    const cta = document.getElementById('cta');
    const blocked = document.getElementById('blocked');

    const hasToken = token && token !== 'missing';
    const upgradeUrl = `/upgrade-form.html?uid=${encodeURIComponent(uid)}&plan=${encodeURIComponent(plan)}&extend=1&source=email`;

    if (!hasToken) {
      infoEl.textContent = 'Access token required.';
      cta.style.display = 'none';
      blocked.style.display = 'block';
      setTimeout(() => { window.location.href = upgradeUrl; }, 1200);
    } else {
      infoEl.textContent = `UID: ${uid} · Token: ${token}`;
      cta.textContent = 'Extend / Refresh Access';
      cta.href = upgradeUrl;
      checkToken();
      setInterval(checkToken, 15000); // poll every 15s for short plans
    }

    async function checkToken() {
      try {
        const res = await fetch(`/token-status?token=${encodeURIComponent(token)}`, { cache: 'no-store' });
        const data = await res.json();
        if (!data?.valid) {
          const targetUid = data?.uid || uid;
          const targetPlan = data?.plan || plan || 'flash40';
          const extendUrl = `/upgrade-form.html?uid=${encodeURIComponent(targetUid)}&plan=${encodeURIComponent(targetPlan)}&extend=1&source=email`;
          const goExtend = confirm('⚠️ Plan expired. Extend now? Press OK to renew, or Cancel to use normal upload.');
          if (goExtend) {
            window.location.href = extendUrl;
          } else {
            window.location.href = 'upload.html';
          }
        }
      } catch (err) {
        console.warn('token check failed', err);
      }
    }
  </script>
</body>
</html>
