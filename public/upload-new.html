<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudSpace - Modern Upload</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #f5576c 75%, #ffa5a5 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            overflow-x: hidden;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        /* ============== HEADER ============== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            gap: 20px;
            flex-wrap: wrap;
        }

        .logo {
            font-size: 36px;
            font-weight: 900;
            color: white;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            letter-spacing: -2px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .profile-card {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 12px 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }

        .profile-card:hover {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.6);
        }

        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: 2px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .avatar:hover {
            transform: scale(1.1) rotate(10deg);
        }

        .coin-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            color: #333;
            padding: 8px 16px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
        }

        .coin-icon {
            font-size: 20px;
            animation: spin 3s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .settings-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.4);
            color: white;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            border: none;
        }

        .settings-btn:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: rotate(90deg);
        }

        /* ============== MAIN CONTENT ============== */
        .main-card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 50px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            margin-bottom: 40px;
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .title {
            font-size: 52px;
            font-weight: 900;
            color: white;
            text-align: center;
            margin-bottom: 15px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            letter-spacing: -1px;
        }

        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.9);
            font-size: 18px;
            margin-bottom: 50px;
            font-weight: 500;
        }

        /* ============== STORAGE CARD ============== */
        .storage-card {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.15), rgba(0, 255, 136, 0.1));
            border: 2px solid rgba(0, 212, 255, 0.4);
            border-radius: 25px;
            padding: 30px;
            margin-bottom: 40px;
            display: flex;
            gap: 30px;
            align-items: center;
            animation: slideInLeft 0.6s ease;
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .storage-circle {
            position: relative;
            width: 140px;
            height: 140px;
            flex-shrink: 0;
        }

        .storage-circle svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
            filter: drop-shadow(0 0 15px rgba(0, 212, 255, 0.6));
        }

        .storage-percent {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #00ff88;
            font-weight: 900;
            font-size: 32px;
            text-shadow: 0 0 15px rgba(0, 255, 136, 0.8);
        }

        .storage-info {
            flex: 1;
        }

        .storage-info h3 {
            color: white;
            font-size: 24px;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .storage-bar {
            background: rgba(0, 0, 0, 0.2);
            height: 16px;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .storage-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #00ff88, #00d4ff);
            background-size: 200% 100%;
            border-radius: 20px;
            animation: shimmer 3s ease-in-out infinite;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.8);
        }

        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .storage-info-row {
            display: flex;
            justify-content: space-between;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600;
            font-size: 15px;
        }

        /* ============== DROP ZONE ============== */
        .drop-zone {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2), rgba(245, 87, 108, 0.15));
            border: 3px dashed rgba(255, 255, 255, 0.5);
            border-radius: 25px;
            padding: 80px 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            margin-bottom: 40px;
        }

        .drop-zone::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(45deg, transparent 30%, rgba(255, 255, 255, 0.1), transparent 70%);
            transform: translateX(-100%);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .drop-zone:hover {
            border-color: rgba(255, 255, 255, 0.9);
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.35), rgba(245, 87, 108, 0.25));
            transform: scale(1.02);
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.3);
        }

        .drop-zone.dragover {
            border-color: #fff;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.45), rgba(245, 87, 108, 0.35));
            transform: scale(1.05);
        }

        .drop-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
            position: relative;
            z-index: 1;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .drop-text {
            color: white;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
        }

        .drop-hint {
            color: rgba(255, 255, 255, 0.8);
            font-size: 16px;
            position: relative;
            z-index: 1;
        }

        #fileInput {
            display: none;
        }

        /* ============== BUTTONS ============== */
        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }

        .btn {
            padding: 16px 32px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.5s, height 0.5s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn span {
            position: relative;
            z-index: 1;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 35px rgba(102, 126, 234, 0.5);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
        }

        .btn-secondary:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 35px rgba(245, 87, 108, 0.5);
        }

        .btn-success {
            background: linear-gradient(135deg, #00ff88, #00d4ff);
            color: #333;
        }

        .btn-success:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 35px rgba(0, 255, 136, 0.5);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ============== FILE LIST ============== */
        .files-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .file-card {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            transition: all 0.3s ease;
            animation: fadeInUp 0.5s ease;
        }

        .file-card:hover {
            background: rgba(255, 255, 255, 0.18);
            border-color: rgba(255, 255, 255, 0.45);
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
        }

        .file-header {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .file-icon {
            font-size: 36px;
            min-width: 50px;
            text-align: center;
        }

        .file-name {
            flex: 1;
            color: white;
            font-weight: 600;
            word-break: break-word;
            font-size: 15px;
        }

        .file-size {
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            font-weight: 500;
        }

        .file-remove {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 59, 48, 0.2);
            border: none;
            color: #ff3b30;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .file-remove:hover {
            background: rgba(255, 59, 48, 0.5);
            transform: scale(1.1);
        }

        .file-progress {
            height: 6px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            overflow: hidden;
        }

        .file-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
            border-radius: 10px;
            transition: width 0.3s ease;
            box-shadow: 0 0 15px rgba(102, 126, 234, 0.6);
        }

        /* ============== PROGRESS CONTAINER ============== */
        #progressContainer {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(0, 255, 136, 0.15));
            border: 2px solid rgba(0, 212, 255, 0.4);
            border-radius: 25px;
            padding: 35px;
            margin-bottom: 40px;
            display: none;
            animation: slideInUp 0.5s ease;
        }

        #progressContainer.show {
            display: block;
        }

        .progress-info {
            color: white;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            text-align: center;
        }

        .progress-bar-main {
            height: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .progress-bar-fill-main {
            height: 100%;
            background: linear-gradient(90deg, #00ff88, #00d4ff, #00ff88);
            background-size: 200% 100%;
            border-radius: 20px;
            animation: shimmer 2s ease-in-out infinite;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.8);
        }

        .progress-text-main {
            color: white;
            font-size: 28px;
            font-weight: 900;
            text-align: center;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.6);
            font-family: 'Courier New', monospace;
        }

        /* ============== RESPONSIVE ============== */
        @media (max-width: 768px) {
            .title {
                font-size: 36px;
            }

            .main-card {
                padding: 30px 20px;
            }

            .storage-card {
                flex-direction: column;
                text-align: center;
            }

            .drop-zone {
                padding: 60px 20px;
            }

            .drop-icon {
                font-size: 60px;
            }

            .button-group {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }

            .files-grid {
                grid-template-columns: 1fr;
            }
        }

        /* ============== ANIMATIONS ============== */
        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">☁️ CloudSpace</div>
            <div class="header-right">
                <div class="profile-card">
                    <div class="avatar">👤</div>
                    <div>
                        <div style="color: white; font-weight: 700; font-size: 14px;" id="userNameHeader">User</div>
                        <div style="color: rgba(255, 255, 255, 0.7); font-size: 12px;">Premium</div>
                    </div>
                </div>
                <div class="coin-badge">
                    <span class="coin-icon">🪙</span>
                    <button id="coinDisplay" type="button" style="background: none; border: none; color: inherit; cursor: pointer; font-size: inherit; padding: 0; font-weight: 700;">5000</button>
                </div>
                <button class="settings-btn">⚙️</button>
            </div>
        </div>

        <!-- Main Card -->
        <div class="main-card">
            <!-- Storage Card -->
            <div class="storage-card">
                <div class="storage-circle">
                    <svg viewBox="0 0 140 140">
                        <circle cx="70" cy="70" r="60" fill="none" stroke="rgba(255, 255, 255, 0.2)" stroke-width="8"/>
                        <circle cx="70" cy="70" r="60" fill="none" stroke="url(#storageGradient)" stroke-width="8" stroke-dasharray="377" stroke-dashoffset="377" stroke-linecap="round" id="storageRing"/>
                        <defs>
                            <linearGradient id="storageGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#00ff88;stop-opacity:1" />
                            </linearGradient>
                        </defs>
                    </svg>
                    <div class="storage-percent" id="storagePercent">0%</div>
                </div>
                <div class="storage-info">
                    <h3>📊 Storage Usage</h3>
                    <div class="storage-bar">
                        <div class="storage-bar-fill" id="storageBarFill" style="width: 0%"></div>
                    </div>
                    <div class="storage-info-row">
                        <span>Used: <span id="usedStorage">0 GB</span></span>
                        <span>Total: <span id="totalStorage">512 GB</span></span>
                        <span>Available: <span id="availableStorage">512 GB</span></span>
                    </div>
                </div>
            </div>

            <!-- Title -->
            <div style="margin-top: 40px;">
                <h1 class="title">📁 Upload Your Files</h1>
                <p class="subtitle">Drag and drop files or click to browse. All file types supported.</p>
            </div>

            <!-- Drop Zone -->
            <div class="drop-zone" id="dropZone">
                <div class="drop-icon">☁️</div>
                <div class="drop-text">Drag & Drop Files Here</div>
                <div class="drop-hint">or click to browse your computer</div>
                <input type="file" id="fileInput" multiple>
            </div>

            <!-- File List -->
            <div class="files-grid" id="filesGrid"></div>

            <!-- Progress -->
            <div id="progressContainer">
                <div class="progress-info" id="progressInfo">Uploading your files...</div>
                <div class="progress-bar-main">
                    <div class="progress-bar-fill-main" id="progressBarMain" style="width: 0%"></div>
                </div>
                <div class="progress-text-main" id="progressPercent">0%</div>
            </div>

            <!-- Buttons -->
            <div class="button-group">
                <button class="btn btn-primary" id="uploadBtn">
                    <span>🚀</span>
                    <span>Upload Files</span>
                </button>
                <button class="btn btn-secondary" id="upgradeBtn" style="display: none;">
                    <span>⭐</span>
                    <span>Upgrade Plan</span>
                </button>
                <button class="btn btn-success" id="clearBtn" style="display: none;">
                    <span>🗑️</span>
                    <span>Clear All</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Coin History Modal -->
    <div id="coinHistoryModal" style="position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; z-index: 9999; align-items: center; justify-content: center;">
        <div style="background: linear-gradient(135deg, #0f172a, #1a1f2e); border: 1px solid rgba(255, 215, 0, 0.3); border-radius: 16px; padding: 24px; max-width: 500px; width: 90%; max-height: 70vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.4);">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                <h2 style="color: #ffe58a; margin: 0; font-size: 20px;">💰 Coin History</h2>
                <button id="closeCoinHistoryBtn" type="button" style="background: none; border: none; font-size: 24px; cursor: pointer; color: #ffe58a;">×</button>
            </div>
            <div id="coinHistoryList" style="max-height: 500px; overflow-y: auto;">
                <div style="text-align: center; color: #aaa; padding: 20px;">Loading...</div>
            </div>
        </div>
    </div>

    <script src="upload.js"></script>
</body>
</html>
