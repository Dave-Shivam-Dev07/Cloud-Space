<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>📝 Signup</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS -->
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="index-animations.css">
    <link rel="stylesheet" href="mobile.css">
</head>

<body>
    <main>
        <h1>✨ Create Account</h1>
        <button id="toggleMobileView" style="position:absolute;top:18px;right:18px;padding:8px 10px;border-radius:8px;border:none;background:rgba(255,255,255,0.12);color:#fff;cursor:pointer;font-weight:700">Mobile View</button>
        <form id="signupForm" class="auth-form">
            <label>Profile Picture</label>
            <div class="avatar-preview">
                <img id="avatarPreview" src="default-avatar.png" alt="Avatar Preview">
            </div>

            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Enter username" required>

            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" placeholder="Enter phone number" required>

            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Enter email" required>

            <!-- CAPTCHA -->
            <div class="captcha-box">
                <canvas id="captchaCanvas" width="120" height="40"></canvas>
                <button type="button" id="refreshCaptcha">🔄</button>
            </div>
            <input type="text" id="captchaInput" placeholder="Enter CAPTCHA" required>

            <!-- Verify button -->
            <a href="#" id="magicLinkBtn" class="verify-btn">🔑 Verify Email</a>
        </form>

        <p>Already have an account?
            <a href="login.html" class="login-link">🔑 Login</a>
        </p>
    </main>

    <!-- Alert -->
    <div id="alertBox" class="alert">
        <p id="alertMessage"></p>
    </div>

    <!-- JS -->
    <script src="index.js"></script>
</body>

</html>
