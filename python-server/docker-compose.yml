version: '3.8'

services:
  # Python Flask Application
  python-api:
    build: .
    container_name: cloud-storage-python-api
    ports:
      - "5000:5000"
    environment:
      - PYTHON_HOST=0.0.0.0
      - PYTHON_PORT=5000
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/cloud_storage
      - MONGODB_URL=mongodb://mongo:27017
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - mongo
      - redis
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    networks:
      - cloud-storage-network
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: cloud-storage-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=cloud_storage
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cloud-storage-network
    restart: unless-stopped

  # MongoDB
  mongo:
    image: mongo:7
    container_name: cloud-storage-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - cloud-storage-network
    restart: unless-stopped

  # Redis
  redis:
    image: redis:7-alpine
    container_name: cloud-storage-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - cloud-storage-network
    restart: unless-stopped

  # Celery Worker (Background Tasks)
  celery-worker:
    build: .
    container_name: cloud-storage-celery
    command: celery -A tasks.celery_app worker --loglevel=info
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/cloud_storage
    depends_on:
      - redis
      - postgres
    networks:
      - cloud-storage-network
    restart: unless-stopped

volumes:
  postgres_data:
  mongo_data:
  redis_data:

networks:
  cloud-storage-network:
    driver: bridge
